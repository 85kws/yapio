name: iOS TestFlight

# Public repo → macOS runner bedava. EAS'in çalışan imzasıyla (build 17'deki cert+profil)
# `eas build --local` runner'da derler (EAS BULUT kotası yemez), sonra altool ile TestFlight'a atar.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26   # Xcode 26 / Swift 6.2 (RN 0.85 swift-tools 6.2 ister)
    timeout-minutes: 90
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: En yeni Xcode'u seç (Swift 6.2)
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: eas-cli kur
        run: npm install -g eas-cli

      - name: EAS local build (EAS imzasıyla; bulut kotası yemez)
        run: |
          eas build --local \
            --platform ios \
            --profile production \
            --non-interactive \
            --output "$RUNNER_TEMP/yapio.ipa"

      - name: IPA'yı artifact olarak sakla
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: ${{ runner.temp }}/yapio.ipa
          if-no-files-found: error

      - name: ASC API key dosyasını yerleştir
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.ASC_KEY_BASE64 }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: TestFlight'a yükle (altool, ASC key)
        run: |
          xcrun altool --upload-app -f "$RUNNER_TEMP/yapio.ipa" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
